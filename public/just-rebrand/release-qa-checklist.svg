<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <rect width="1400" height="520" fill="#f8f7f2" />
  <text x="80" y="70" font-family="Red Hat Text, system-ui, sans-serif" font-size="22" fill="#1d4e5c" font-weight="600">Release QA Checklist (Template)</text>
  <text x="80" y="100" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b7b85" letter-spacing="0.12em">SENIOR UX ENGINEER PROOF — RELIABILITY + QUALITY GATES</text>

  <g font-family="Red Hat Text, system-ui, sans-serif" font-size="14" fill="#102531">
    <rect x="80" y="140" width="1240" height="320" rx="16" fill="#ffffff" stroke="#d6dde2"/>

    <text x="110" y="190" font-weight="600">Accessibility</text>
    <text x="110" y="214" fill="#5a6b76" font-size="12">Color contrast, focus order, keyboard traps, ARIA labels</text>

    <text x="110" y="260" font-weight="600">Responsive Fidelity</text>
    <text x="110" y="284" fill="#5a6b76" font-size="12">375 / 768 / 1280 breakpoints verified for all 35 modules</text>

    <text x="110" y="330" font-weight="600">CMS Safety</text>
    <text x="110" y="354" fill="#5a6b76" font-size="12">Field fallbacks, long text truncation, empty states, image ratios</text>

    <text x="720" y="190" font-weight="600">Content Migration</text>
    <text x="720" y="214" fill="#5a6b76" font-size="12">Legacy content mapped to new ACF fields, QAed by page</text>

    <text x="720" y="260" font-weight="600">Performance Targets</text>
    <text x="720" y="284" fill="#5a6b76" font-size="12">LCP &lt; 2.5s, CLS &lt; 0.1, TTFB &lt; 600ms [unverified]</text>

    <text x="720" y="330" font-weight="600">Cross-Browser</text>
    <text x="720" y="354" fill="#5a6b76" font-size="12">Chrome, Safari, Firefox sanity pass on templates</text>
  </g>

  <g fill="#1d4e5c">
    <circle cx="96" cy="182" r="7" />
    <circle cx="96" cy="252" r="7" />
    <circle cx="96" cy="322" r="7" />
    <circle cx="706" cy="182" r="7" />
    <circle cx="706" cy="252" r="7" />
    <circle cx="706" cy="322" r="7" />
  </g>
</svg>
