<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="340" viewBox="0 0 1400 340">
  <rect width="1400" height="340" fill="#f8f7f2" />

  <!-- Title -->
  <text x="80" y="58" font-family="Red Hat Text, system-ui, sans-serif" font-size="20" fill="#1d4e5c" font-weight="600">The Engineering Pipeline</text>
  <text x="80" y="84" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#6b7b85" letter-spacing="0.12em">AGENCY FIGMA  →  SEMANTIC TOKEN MAP  →  CUSTOM PHP MODULES  →  ACF SCHEMA  →  WORDPRESS CMS  →  LIVE PRODUCTION</text>

  <!-- Pipeline nodes -->
  <!-- 1: Agency Figma -->
  <rect x="60" y="130" width="188" height="90" rx="12" fill="#ffffff" stroke="#d6dde2" stroke-width="1.5"/>
  <text x="80" y="162" font-family="Red Hat Text, system-ui, sans-serif" font-size="13" fill="#102531" font-weight="600">Agency Figma</text>
  <text x="80" y="182" font-family="Red Hat Text, system-ui, sans-serif" font-size="11" fill="#5a6b76">High-fidelity layouts</text>
  <text x="80" y="199" font-family="Red Hat Text, system-ui, sans-serif" font-size="11" fill="#5a6b76">+ design tokens</text>

  <!-- Arrow 1 -->
  <line x1="248" y1="175" x2="276" y2="175" stroke="#1d4e5c" stroke-width="2"/>
  <polygon points="276,170 286,175 276,180" fill="#1d4e5c"/>

  <!-- 2: Semantic Token Map -->
  <rect x="286" y="130" width="188" height="90" rx="12" fill="#ffffff" stroke="#d6dde2" stroke-width="1.5"/>
  <text x="306" y="162" font-family="Red Hat Text, system-ui, sans-serif" font-size="13" fill="#102531" font-weight="600">Semantic Token Map</text>
  <text x="306" y="182" font-family="Red Hat Text, system-ui, sans-serif" font-size="11" fill="#5a6b76">Primitives → aliases</text>
  <text x="306" y="199" font-family="Red Hat Text, system-ui, sans-serif" font-size="11" fill="#5a6b76">1:1 agency naming</text>

  <!-- Arrow 2 -->
  <line x1="474" y1="175" x2="502" y2="175" stroke="#1d4e5c" stroke-width="2"/>
  <polygon points="502,170 512,175 502,180" fill="#1d4e5c"/>

  <!-- 3: Custom PHP Modules -->
  <rect x="512" y="130" width="188" height="90" rx="12" fill="#ffffff" stroke="#d6dde2" stroke-width="1.5"/>
  <text x="532" y="162" font-family="Red Hat Text, system-ui, sans-serif" font-size="13" fill="#102531" font-weight="600">Custom PHP Modules</text>
  <text x="532" y="182" font-family="Red Hat Text, system-ui, sans-serif" font-size="11" fill="#5a6b76">35 reusable blocks</text>
  <text x="532" y="199" font-family="Red Hat Text, system-ui, sans-serif" font-size="11" fill="#5a6b76">HTML + vanilla JS</text>

  <!-- Arrow 3 -->
  <line x1="700" y1="175" x2="728" y2="175" stroke="#1d4e5c" stroke-width="2"/>
  <polygon points="728,170 738,175 728,180" fill="#1d4e5c"/>

  <!-- 4: ACF Schema -->
  <rect x="738" y="130" width="188" height="90" rx="12" fill="#ffffff" stroke="#d6dde2" stroke-width="1.5"/>
  <text x="758" y="162" font-family="Red Hat Text, system-ui, sans-serif" font-size="13" fill="#102531" font-weight="600">ACF Schema</text>
  <text x="758" y="182" font-family="Red Hat Text, system-ui, sans-serif" font-size="11" fill="#5a6b76">Field validation rules</text>
  <text x="758" y="199" font-family="Red Hat Text, system-ui, sans-serif" font-size="11" fill="#5a6b76">Editor-safe content API</text>

  <!-- Arrow 4 -->
  <line x1="926" y1="175" x2="954" y2="175" stroke="#1d4e5c" stroke-width="2"/>
  <polygon points="954,170 964,175 954,180" fill="#1d4e5c"/>

  <!-- 5: WordPress CMS -->
  <rect x="964" y="130" width="188" height="90" rx="12" fill="#ffffff" stroke="#d6dde2" stroke-width="1.5"/>
  <text x="984" y="162" font-family="Red Hat Text, system-ui, sans-serif" font-size="13" fill="#102531" font-weight="600">WordPress CMS</text>
  <text x="984" y="182" font-family="Red Hat Text, system-ui, sans-serif" font-size="11" fill="#5a6b76">Marketing-owned</text>
  <text x="984" y="199" font-family="Red Hat Text, system-ui, sans-serif" font-size="11" fill="#5a6b76">publishing layer</text>

  <!-- Arrow 5 -->
  <line x1="1152" y1="175" x2="1180" y2="175" stroke="#1d4e5c" stroke-width="2"/>
  <polygon points="1180,170 1190,175 1180,180" fill="#1d4e5c"/>

  <!-- 6: Live Production -->
  <rect x="1190" y="130" width="148" height="90" rx="12" fill="#1d4e5c" stroke="#1d4e5c" stroke-width="1.5"/>
  <text x="1210" y="162" font-family="Red Hat Text, system-ui, sans-serif" font-size="13" fill="#ffffff" font-weight="600">Live Production</text>
  <text x="1210" y="182" font-family="Red Hat Text, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">justcapital.com</text>
  <text x="1210" y="199" font-family="Red Hat Text, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">fully responsive</text>

  <!-- Step numbers -->
  <text x="144" y="122" font-family="JetBrains Mono, monospace" font-size="9" fill="#1d4e5c" letter-spacing="0.08em" text-anchor="middle">01</text>
  <text x="380" y="122" font-family="JetBrains Mono, monospace" font-size="9" fill="#1d4e5c" letter-spacing="0.08em" text-anchor="middle">02</text>
  <text x="606" y="122" font-family="JetBrains Mono, monospace" font-size="9" fill="#1d4e5c" letter-spacing="0.08em" text-anchor="middle">03</text>
  <text x="832" y="122" font-family="JetBrains Mono, monospace" font-size="9" fill="#1d4e5c" letter-spacing="0.08em" text-anchor="middle">04</text>
  <text x="1058" y="122" font-family="JetBrains Mono, monospace" font-size="9" fill="#1d4e5c" letter-spacing="0.08em" text-anchor="middle">05</text>
  <text x="1264" y="122" font-family="JetBrains Mono, monospace" font-size="9" fill="#1d4e5c" letter-spacing="0.08em" text-anchor="middle">06</text>

  <!-- Bottom label -->
  <text x="700" y="296" font-family="JetBrains Mono, monospace" font-size="10" fill="#9aafb8" letter-spacing="0.08em" text-anchor="middle">8-week accelerated delivery · zero post-launch engineering tickets</text>
</svg>
